<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dango Clock - Full Precision</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #fcf5e5; font-family: 'Courier New', Courier, monospace; }
        #clock { width: 300px; height: 300px; border: 10px solid #333; border-radius: 50%; position: relative; background: white; margin-bottom: 20px; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: #333; border-radius: 5px; }
        #hourHand { width: 6px; height: 70px; margin-left: -3px; }
        #minuteHand { width: 4px; height: 100px; margin-left: -2px; background: #555; }
        #secondHand { width: 2px; height: 120px; margin-left: -1px; background: red; }
        .number { position: absolute; width: 100%; height: 100%; text-align: center; font-weight: bold; padding-top: 10px; font-size: 1.2em; }
        #info { text-align: center; color: #333; }
    </style>
</head>
<body>

<div id="clock">
    <script>
        for(let i=1; i<=12; i++) {
            document.write(`<div class="number" style="transform: rotate(${i*30}deg)">${i}</div>`);
        }
    </script>
    <div id="hourHand" class="hand"></div>
    <div id="minuteHand" class="hand"></div>
    <div id="secondHand" class="hand"></div>
</div>

<div id="info">
    <div id="calendar">Dương: 08/06/2026 | Âm lịch: 13/5 Ất Tỵ</div>
    <div id="dangoTime" style="font-weight: bold; color: #d35400; font-size: 1.5em; margin-top: 10px;">00:00:00</div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        
        // --- 1. Tính toán thời gian Dango (Logic: 24h = 12h) ---
        const totalMs = (now.getHours() * 3600000) + (now.getMinutes() * 60000) + (now.getSeconds() * 1000) + now.getMilliseconds();
        const dangoTotalMs = totalMs / 2; // Tỷ lệ nén 0.5
        
        const dH = Math.floor(dangoTotalMs / 3600000) % 12;
        const dM = Math.floor((dangoTotalMs % 3600000) / 60000);
        const dS = Math.floor((dangoTotalMs % 60000) / 1000);
        
        const pad = (n) => n.toString().padStart(2, '0');
        document.getElementById('dangoTime').innerText = `${pad(dH)}:${pad(dM)}:${pad(dS)}`;

        // --- 2. Cập nhật góc kim ---
        // Kim giờ: 24h thực quay 1 vòng (360 độ). Một giờ thực = 15 độ.
        const hourAngle = ((now.getHours() + now.getMinutes()/60) * 15);
        // Kim phút: quay bình thường theo phút
        const minuteAngle = now.getMinutes() * 6;
        // Kim giây: quay bình thường theo giây
        const secondAngle = now.getSeconds() * 6;

        document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourAngle}deg)`;
        document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteAngle}deg)`;
        document.getElementById('secondHand').style.transform = `translateX(-50%) rotate(${secondAngle}deg)`;
    }
    
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
